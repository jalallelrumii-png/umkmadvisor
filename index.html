<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UMKM Advisor — Ruang Konsultasi AI</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,500&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #080c14;
  --surface:   #0d1220;
  --surface2:  #111828;
  --surface3:  #16202e;
  --border:    #1e2d45;
  --border2:   #243350;
  --gold:      #c9a84c;
  --gold2:     #e8c97a;
  --gold-dim:  #7a6230;
  --navy:      #0d1a30;
  --cream:     #f0e8d5;
  --text:      #dce6f0;
  --text-mid:  #8499b8;
  --text-dim:  #3d546e;
  --red:       #e05c5c;
  --green:     #4cad7a;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background-image:
    radial-gradient(ellipse 80% 50% at 20% 0%, rgba(201,168,76,0.04) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 100%, rgba(13,26,48,0.6) 0%, transparent 60%);
}

/* ── HEADER ── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 28px;
  height: 58px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
  position: relative;
}

.header::after {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold-dim) 30%, var(--gold-dim) 70%, transparent);
}

.brand {
  display: flex;
  align-items: center;
  gap: 14px;
}

.brand-emblem {
  width: 36px;
  height: 36px;
  border: 1.5px solid var(--gold);
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}
.brand-emblem::before {
  content: '◈';
  font-size: 16px;
  color: var(--gold);
  line-height: 1;
}

.brand-text {}
.brand-name {
  font-family: 'Playfair Display', serif;
  font-size: 15px;
  font-weight: 700;
  color: var(--cream);
  letter-spacing: 0.01em;
}
.brand-sub {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  color: var(--gold-dim);
  letter-spacing: 0.18em;
  text-transform: uppercase;
  margin-top: 1px;
}

.header-center {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  color: var(--text-dim);
  letter-spacing: 0.15em;
  text-transform: uppercase;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 16px;
}

/* API Key Input in header */
.api-key-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 6px;
  padding: 6px 12px;
  transition: border-color 0.2s;
}
.api-key-wrap:focus-within {
  border-color: var(--gold-dim);
}
.api-key-icon {
  font-size: 11px;
  color: var(--text-dim);
}
.api-key-input {
  background: none;
  border: none;
  outline: none;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--text-mid);
  width: 200px;
  letter-spacing: 0.05em;
}
.api-key-input::placeholder { color: var(--text-dim); }
.api-key-status {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--text-dim);
  flex-shrink: 0;
  transition: background 0.3s;
}
.api-key-status.valid { background: var(--green); box-shadow: 0 0 6px var(--green); }

.session-badge {
  display: flex;
  align-items: center;
  gap: 7px;
  border: 1px solid rgba(228,74,74,0.25);
  background: rgba(228,74,74,0.05);
  border-radius: 20px;
  padding: 5px 14px;
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  font-weight: 500;
  color: #e44a4a;
  letter-spacing: 0.12em;
  transition: all 0.3s;
}
.session-badge.live {
  border-color: rgba(228,74,74,0.5);
  background: rgba(228,74,74,0.1);
  box-shadow: 0 0 14px rgba(228,74,74,0.12);
}
.session-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #555;
  transition: all 0.3s;
}
.session-dot.on {
  background: #e44a4a;
  animation: blink 1.2s infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }

/* ── MAIN ── */
.main {
  flex: 1;
  display: grid;
  grid-template-columns: 320px 1fr;
  overflow: hidden;
  min-height: 0;
}

/* ── LEFT PANEL ── */
.left-panel {
  border-right: 1px solid var(--border);
  background: var(--surface);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}
.left-panel::before {
  content: '';
  position: absolute;
  top: 0; right: 0;
  width: 1px; height: 100%;
  background: linear-gradient(to bottom, var(--gold-dim), transparent 40%, transparent 60%, var(--gold-dim));
  opacity: 0.4;
}

.section-label {
  padding: 11px 18px;
  border-bottom: 1px solid var(--border);
  font-family: 'DM Mono', monospace;
  font-size: 8.5px;
  letter-spacing: 0.22em;
  color: var(--text-dim);
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-label::before {
  content: '';
  width: 16px;
  height: 1px;
  background: var(--gold);
}

/* Visual Panel — Isometric Office */
.visual-wrap {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
  position: relative;
  overflow: hidden;
  min-height: 0;
}
.visual-wrap::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 50% 60%, rgba(201,168,76,0.05) 0%, transparent 65%);
  pointer-events: none;
}

.office-svg { width: 100%; max-height: 100%; }

.speech-bubble { opacity: 0; transition: opacity 0.3s; }
.speech-bubble.visible { opacity: 1; animation: bubPop 0.6s infinite alternate; }
@keyframes bubPop { from{transform:scale(1)} to{transform:scale(1.2)} }

/* ── ADVISOR LIST ── */
.advisor-list {
  border-top: 1px solid var(--border);
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 3px;
  overflow-y: auto;
  max-height: 200px;
}
.advisor-list::-webkit-scrollbar { width: 3px; }
.advisor-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

.adv-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 10px;
  border-radius: 7px;
  border: 1px solid transparent;
  transition: all 0.25s;
}
.adv-row.active {
  border-color: rgba(201,168,76,0.25);
  background: rgba(201,168,76,0.05);
}
.adv-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
  transition: box-shadow 0.3s;
}
.adv-row.active .adv-dot { animation: blink 0.9s infinite; }
.adv-av {
  width: 30px; height: 30px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'DM Mono', monospace;
  font-size: 9.5px;
  font-weight: 500;
  color: #000;
  flex-shrink: 0;
}
.adv-info { flex: 1; min-width: 0; }
.adv-name { font-size: 12.5px; font-weight: 600; color: var(--text); }
.adv-role { font-size: 9.5px; color: var(--text-dim); font-family: 'DM Mono', monospace; margin-top: 1px; }
.adv-status {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  color: var(--text-dim);
  transition: color 0.3s;
}
.adv-status.on { color: var(--gold); }

/* ── RIGHT PANEL ── */
.right-panel {
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.chat-topbar {
  padding: 10px 22px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.chat-topic {
  font-family: 'DM Mono', monospace;
  font-size: 9.5px;
  color: var(--text-dim);
  letter-spacing: 0.08em;
}
.chat-topic span {
  color: var(--gold2);
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 11px;
  letter-spacing: 0;
}
.session-info {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  color: var(--text-dim);
}

/* Chat Feed */
.chat-feed {
  flex: 1;
  overflow-y: auto;
  padding: 20px 24px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  scroll-behavior: smooth;
}
.chat-feed::-webkit-scrollbar { width: 4px; }
.chat-feed::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

/* Empty state */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  height: 100%;
  text-align: center;
  padding: 40px;
}
.empty-emblem {
  width: 64px; height: 64px;
  border: 1px solid var(--border2);
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  background: var(--surface2);
  color: var(--gold-dim);
  margin-bottom: 4px;
}
.empty-title {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  color: var(--text-mid);
  font-weight: 600;
}
.empty-desc {
  font-size: 13px;
  color: var(--text-dim);
  max-width: 340px;
  line-height: 1.75;
}
.empty-advisors {
  display: flex;
  gap: 10px;
  margin-top: 4px;
}
.ea {
  width: 38px; height: 38px;
  border-radius: 50%;
  opacity: 0.2;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  font-weight: 500;
  color: #000;
  display: flex; align-items: center; justify-content: center;
}

/* Messages */
.msg {
  display: flex;
  gap: 13px;
  animation: msgIn 0.4s ease forwards;
  opacity: 0;
  transform: translateY(10px);
}
@keyframes msgIn { to { opacity:1; transform:translateY(0); } }

.msg-av {
  width: 38px; height: 38px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  font-weight: 500;
  color: #000;
  flex-shrink: 0;
  margin-top: 2px;
}
.msg-body { flex: 1; min-width: 0; }
.msg-meta {
  display: flex;
  align-items: baseline;
  gap: 8px;
  margin-bottom: 6px;
}
.msg-name {
  font-family: 'Playfair Display', serif;
  font-size: 14px;
  font-weight: 700;
  font-style: italic;
}
.msg-role {
  font-family: 'DM Mono', monospace;
  font-size: 9.5px;
  color: var(--text-dim);
}
.msg-time {
  font-family: 'DM Mono', monospace;
  font-size: 9.5px;
  color: var(--text-dim);
  margin-left: auto;
}
.msg-bubble {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 2px 12px 12px 12px;
  padding: 11px 15px;
  font-size: 13.5px;
  line-height: 1.7;
  color: var(--text);
  position: relative;
}
.msg-bubble::before {
  content: '';
  position: absolute;
  left: 0; top: 0;
  width: 2px;
  height: 100%;
  border-radius: 2px;
}

/* Typing */
.typing-msg {
  display: flex;
  gap: 13px;
  align-items: flex-start;
}
.typing-bubble {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 2px 12px 12px 12px;
  padding: 13px 18px;
  display: flex;
  gap: 5px;
  align-items: center;
}
.t-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  animation: td 1.1s infinite;
}
.t-dot:nth-child(2) { animation-delay: 0.18s; }
.t-dot:nth-child(3) { animation-delay: 0.36s; }
@keyframes td {
  0%,80%,100% { transform:scale(0.5); opacity:0.3; }
  40% { transform:scale(1); opacity:1; }
}
.typing-label {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--text-dim);
  font-style: italic;
  align-self: center;
  margin-left: 10px;
}

/* System msg */
.sys-msg {
  display: flex;
  align-items: center;
  gap: 12px;
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  color: var(--text-dim);
  letter-spacing: 0.14em;
  text-transform: uppercase;
}
.sys-msg::before,.sys-msg::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}
.sys-msg.hl { color: var(--gold); }
.sys-msg.hl::before,.sys-msg.hl::after { background: linear-gradient(90deg, transparent, var(--gold-dim)); }
.sys-msg.hl + .sys-msg.hl { }

/* ── CONTROLS ── */
.controls {
  padding: 14px 20px;
  border-top: 1px solid var(--border);
  background: var(--surface);
  display: flex;
  flex-direction: column;
  gap: 10px;
  flex-shrink: 0;
  position: relative;
}
.controls::before {
  content: '';
  position: absolute;
  top: 0; left: 20px; right: 20px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold-dim) 40%, var(--gold-dim) 60%, transparent);
  opacity: 0.5;
}

/* Preset topics */
.presets {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.preset-btn {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 20px;
  padding: 5px 12px;
  font-family: 'DM Sans', sans-serif;
  font-size: 11px;
  color: var(--text-mid);
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.preset-btn:hover {
  border-color: var(--gold-dim);
  color: var(--gold2);
  background: rgba(201,168,76,0.06);
}

.input-row {
  display: flex;
  gap: 10px;
  align-items: center;
}
.topic-input {
  flex: 1;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 11px 16px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s;
}
.topic-input:focus { border-color: var(--gold-dim); }
.topic-input::placeholder { color: var(--text-dim); }

.btn-start {
  background: linear-gradient(135deg, #b8922a, #c9a84c);
  border: none;
  border-radius: 8px;
  padding: 11px 22px;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  font-weight: 500;
  color: #000;
  cursor: pointer;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  transition: all 0.2s;
  white-space: nowrap;
  box-shadow: 0 2px 12px rgba(201,168,76,0.2);
}
.btn-start:hover:not(:disabled) {
  transform: translateY(-1px);
  box-shadow: 0 4px 20px rgba(201,168,76,0.35);
}
.btn-start:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="brand">
    <div class="brand-emblem"></div>
    <div class="brand-text">
      <div class="brand-name">UMKM Advisor</div>
      <div class="brand-sub">Ruang Konsultasi AI · Indonesia</div>
    </div>
  </div>

  <div class="header-center">5 Advisor · Groq llama-3.3-70b</div>

  <div class="header-right">
    <div class="api-key-wrap">
      <span class="api-key-icon">🔑</span>
      <input
        type="password"
        class="api-key-input"
        id="apiKeyInput"
        placeholder="Groq API Key (gsk_...)"
        autocomplete="off"
      />
      <div class="api-key-status" id="apiKeyStatus"></div>
    </div>
    <div class="session-badge" id="sessionBadge">
      <div class="session-dot" id="sessionDot"></div>
      <span id="sessionText">STANDBY</span>
    </div>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- LEFT PANEL -->
  <div class="left-panel">
    <div class="section-label">Para Advisor Anda</div>

    <div class="visual-wrap">
      <svg class="office-svg" viewBox="0 0 300 240" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <pattern id="floorGrid" patternUnits="userSpaceOnUse" width="20" height="10">
            <path d="M0,5 L10,0 L20,5 L10,10 Z" fill="none" stroke="#1e2d45" stroke-width="0.5"/>
          </pattern>
          <radialGradient id="goldGlow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.08"/>
            <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
          </radialGradient>
          <filter id="glow">
            <feGaussianBlur stdDeviation="3" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>

        <!-- FLOOR -->
        <polygon points="150,18 292,94 150,170 8,94" fill="#0d1220" stroke="#1e2d45" stroke-width="1.2"/>
        <polygon points="150,18 292,94 150,170 8,94" fill="url(#floorGrid)" opacity="0.8"/>
        <ellipse cx="150" cy="94" rx="90" ry="42" fill="url(#goldGlow)"/>

        <!-- WALLS -->
        <polygon points="8,94 150,170 150,210 8,134" fill="#0b101c" stroke="#1e2d45" stroke-width="0.8"/>
        <polygon points="292,94 150,170 150,210 292,134" fill="#0d1220" stroke="#1e2d45" stroke-width="0.8"/>

        <!-- Gold accent line -->
        <line x1="8" y1="94" x2="150" y2="18" stroke="#c9a84c" stroke-width="0.4" opacity="0.3"/>
        <line x1="292" y1="94" x2="150" y2="18" stroke="#c9a84c" stroke-width="0.4" opacity="0.3"/>

        <!-- DESKS -->
        <!-- Desk Rina (top center) -->
        <g transform="translate(150,48)">
          <polygon points="0,-16 28,0 0,16 -28,0" fill="#111828" stroke="#1e2d45" stroke-width="1"/>
          <polygon points="-28,0 0,16 0,26 -28,10" fill="#0e1524" stroke="#1e2d45" stroke-width="0.7"/>
          <polygon points="28,0 0,16 0,26 28,10" fill="#101622" stroke="#1e2d45" stroke-width="0.7"/>
          <rect x="-9" y="-22" width="18" height="11" rx="1.5" fill="#0a1828" stroke="#c9a84c" stroke-width="0.7" opacity="0.8"/>
          <rect x="-7" y="-20" width="14" height="8" fill="#060f1c"/>
          <rect x="-7" y="-20" width="14" height="8" fill="#c9a84c" opacity="0.05"/>
        </g>

        <!-- Desk Dika (left) -->
        <g transform="translate(80,103)">
          <polygon points="0,-14 24,0 0,14 -24,0" fill="#111828" stroke="#1e2d45" stroke-width="1"/>
          <polygon points="-24,0 0,14 0,23 -24,9" fill="#0e1524" stroke="#1e2d45" stroke-width="0.7"/>
          <polygon points="24,0 0,14 0,23 24,9" fill="#101622" stroke="#1e2d45" stroke-width="0.7"/>
          <rect x="-8" y="-18" width="16" height="10" rx="1.5" fill="#0a1828" stroke="#c9a84c" stroke-width="0.7" opacity="0.8"/>
          <rect x="-6" y="-16" width="12" height="7" fill="#060f1c"/>
          <rect x="-6" y="-16" width="12" height="7" fill="#c9a84c" opacity="0.05"/>
        </g>

        <!-- Desk Pak Hendra (right) -->
        <g transform="translate(220,103)">
          <polygon points="0,-14 24,0 0,14 -24,0" fill="#111828" stroke="#1e2d45" stroke-width="1"/>
          <polygon points="-24,0 0,14 0,23 -24,9" fill="#0e1524" stroke="#1e2d45" stroke-width="0.7"/>
          <polygon points="24,0 0,14 0,23 24,9" fill="#101622" stroke="#1e2d45" stroke-width="0.7"/>
          <rect x="-8" y="-18" width="16" height="10" rx="1.5" fill="#0a1828" stroke="#c9a84c" stroke-width="0.7" opacity="0.8"/>
          <rect x="-6" y="-16" width="12" height="7" fill="#060f1c"/>
          <rect x="-6" y="-16" width="12" height="7" fill="#c9a84c" opacity="0.05"/>
        </g>

        <!-- Desk Tari (lower left) -->
        <g transform="translate(112,143)">
          <polygon points="0,-14 24,0 0,14 -24,0" fill="#111828" stroke="#1e2d45" stroke-width="1"/>
          <polygon points="-24,0 0,14 0,23 -24,9" fill="#0e1524" stroke="#1e2d45" stroke-width="0.7"/>
          <polygon points="24,0 0,14 0,23 24,9" fill="#101622" stroke="#1e2d45" stroke-width="0.7"/>
          <rect x="-8" y="-18" width="16" height="10" rx="1.5" fill="#0a1828" stroke="#c9a84c" stroke-width="0.7" opacity="0.8"/>
          <rect x="-6" y="-16" width="12" height="7" fill="#060f1c"/>

<script>
// ── ADVISORS ──
const ADVISORS = [

Datamu: kamu tahu bahwa 78% konsumen Indonesia riset produk di media sosial sebelum beli. TikTok Shop tumbuh 300% YoY. UMKM yang konsisten posting 3x seminggu rata-rata naik omzet 40% dalam 3 bulan.

ATURAN MUTLAK:

- Maksimal 3 kalimat saja — tidak lebih

  {
    id: 'keuangan',

    short: 'Keuangan',

    system: `Kamu adalah Pak Hendra, Konsultan Keuangan UMKM yang sudah 15 tahun bantu pengusaha kecil Indonesia kelola uang dengan benar.

Datamu: 82% UMKM Indonesia tidak memisahkan keuangan pribadi dan bisnis. 67% tidak tahu HPP produknya sendiri. KUR 2024 bunganya 6% per tahun — masih banyak yang belum memanfaatkan.
Karaktermu: teliti, sabar, tahu bahwa literasi keuangan UMKM masih rendah jadi selalu mulai dari yang paling dasar.

Keahlianmu: sistem order management via WhatsApp Business (template pesan, katalog, Quick Reply), tools gratis untuk UMKM (Google Sheets, Canva, Notion, GoBiz, Tokopedia/Shopee dashboard), otomasi sederhana dengan Zapier/Make, sistem invoicing digital, SOP operasional harian.
Datamu: 71% solopreneur Indonesia masih terima order via WA pribadi tanpa sistem. Rata-rata pebisnis kecil buang 3-4 jam/hari untuk hal admin yang bisa diotomasi. WhatsApp Business gratis sudah cukup untuk 80% kebutuhan UMKM.
Karaktermu: pragmatis, suka kasih solusi yang bisa langsung dipakai hari ini, tidak suka ribet.

  {

    short: 'Mindset',
    color: '#b07ee8',
    init: 'BU',
    system: `Kamu adalah Mas Budi, Mentor Mindset & Growth yang sudah bantu ratusan solopreneur Indonesia melewati plateau dan burnout.

Keahlianmu: mengatasi solopreneur burnout, transisi dari pekerja keras ke pemikir strategis, delegasi pertama, mindset pricing tanpa rasa bersalah, ketakutan gagal, konsistensi jangka panjang, dan identity shift dari "karyawan" ke "pebisnis."

Karaktermu: hangat tapi jujur, tidak basa-basi, langsung sentuh akar masalah psikologis di balik masalah bisnis.
Gaya bicara: empatik, sering tanya "kenapa" di balik masalah permukaan, sesekali pakai pertanyaan reflektif yang powerful.

ATURAN MUTLAK:
- Jawab HANYA dalam Bahasa Indonesia yang natural

- Fokus pada pola pikir, mental block, dan sisi manusiawi dari tantangan bisnis`
  }
];

// ── PRESET TOPICS ──
const PRESETS = [
  "Omzet stagnan 3 bulan, tidak tahu harus apa",
  "WA orderan chaos, sering kelewatan",
  "Mau naikan harga tapi takut pelanggan kabur",
  "Tidak bisa pisahkan uang bisnis & pribadi",
  "Sudah posting tiap hari tapi penjualan sepi",
  "Burnout tapi tidak bisa berhenti kerja",
  "Mau mulai iklan Meta Ads, budget terbatas",
];

let isRunning = false;
let history = [];

// ── API KEY ──
const apiKeyInput = document.getElementById('apiKeyInput');
const apiKeyStatus = document.getElementById('apiKeyStatus');

apiKeyInput.addEventListener('input', () => {
  const val = apiKeyInput.value.trim();
  const valid = val.startsWith('gsk_') && val.length > 20;
  apiKeyStatus.className = 'api-key-status' + (valid ? ' valid' : '');
});

function getApiKey() {
  return apiKeyInput.value.trim();
}

// ── PRESETS ──
function initPresets() {
  const el = document.getElementById('presetList');
  el.innerHTML = PRESETS.map(p => `
    <button class="preset-btn" onclick="setPreset(this)">${p}</button>
  `).join('');
}

function setPreset(btn) {
  document.getElementById('topicInput').value = btn.textContent;
}

// ── ADVISOR LIST ──
function initList() {
  const el = document.getElementById('advisorList');
  el.innerHTML = ADVISORS.map(a => `
    <div class="adv-row" id="row-${a.id}">
      <div class="adv-dot" id="dot-${a.id}" style="background:${a.color}; color:${a.color};"></div>
      <div class="adv-av" style="background:${a.color};">${a.init}</div>
      <div class="adv-info">
        <div class="adv-name">${a.name}</div>
        <div class="adv-role">${a.role}</div>
      </div>
      <div class="adv-status" id="sts-${a.id}">standby</div>
    </div>
  `).join('');
}

// ── ACTIVATE ──
function activate(id) {
  ADVISORS.forEach(a => {
    document.getElementById(`row-${a.id}`).classList.remove('active');
    const sts = document.getElementById(`sts-${a.id}`);
    sts.textContent = 'standby';
    sts.classList.remove('on');
    const sb = document.getElementById(`sb-${a.id}`);
    const sbt = document.getElementById(`sbt-${a.id}`);
    if (sb) { sb.classList.remove('visible'); }
    if (sbt) { sbt.classList.remove('visible'); }
    const av = document.getElementById(`av-${a.id}`);
    if (av) av.style.filter = '';
  });

  if (!id) return;

  document.getElementById(`row-${id}`).classList.add('active');
  const sts = document.getElementById(`sts-${id}`);
  sts.textContent = '● bicara';
  sts.classList.add('on');
  const sb = document.getElementById(`sb-${id}`);
  const sbt = document.getElementById(`sbt-${id}`);
  if (sb) { sb.classList.add('visible'); }
  if (sbt) { sbt.classList.add('visible'); }
  const agent = ADVISORS.find(a => a.id === id);
  const av = document.getElementById(`av-${id}`);
  if (av && agent) av.style.filter = `drop-shadow(0 0 10px ${agent.color})`;
}

// ── CHAT HELPERS ──
function addSys(text, hl = false) {
  const feed = document.getElementById('chatFeed');
  const el = document.createElement('div');
  el.className = 'sys-msg' + (hl ? ' hl' : '');
  el.textContent = text;
  feed.appendChild(el);
  feed.scrollTop = feed.scrollHeight;
}

function showTyping(advisor) {
  const feed = document.getElementById('chatFeed');
  const el = document.createElement('div');
  el.className = 'typing-msg';
  el.id = 'typing';
  el.innerHTML = `
    <div class="msg-av" style="background:${advisor.color};">${advisor.init}</div>
    <div style="display:flex;align-items:center;gap:0;">
      <div class="typing-bubble">
        <div class="t-dot" style="background:${advisor.color};"></div>
        <div class="t-dot" style="background:${advisor.color};"></div>
        <div class="t-dot" style="background:${advisor.color};"></div>
      </div>
      <span class="typing-label">${advisor.name} sedang berpikir...</span>
    </div>
  `;
  feed.appendChild(el);
  feed.scrollTop = feed.scrollHeight;
}

function removeTyping() {
  document.getElementById('typing')?.remove();
}

function addMsg(advisor, text) {
  const feed = document.getElementById('chatFeed');
  const now = new Date().toLocaleTimeString('id-ID', { hour:'2-digit', minute:'2-digit' });
  const el = document.createElement('div');
  el.className = 'msg';
  el.innerHTML = `
    <div class="msg-av" style="background:${advisor.color};">${advisor.init}</div>
    <div class="msg-body">
      <div class="msg-meta">
        <span class="msg-name" style="color:${advisor.color};">${advisor.name}</span>
        <span class="msg-role">${advisor.role}</span>
        <span class="msg-time">${now}</span>
      </div>
      <div class="msg-bubble" style="border-left: 2px solid ${advisor.color}30;">${text}</div>
    </div>
  `;
  feed.appendChild(el);
  feed.scrollTop = feed.scrollHeight;
}

// ── GROQ API CALL ──
async function callAdvisor(advisor, topic) {
  const apiKey = getApiKey();
  if (!apiKey) throw new Error('API key Groq belum diisi.');

  const context = history.length === 0
    ? `Masalah klien UMKM/solopreneur: "${topic}"\n\nKamu adalah advisor pertama yang merespons. Buka sesi konsultasi dan berikan pandangan awal dari sudut pandang keahlianmu.`
    : `Masalah klien UMKM/solopreneur: "${topic}"\n\nDiskusi para advisor sejauh ini:\n${history.map(h => `${h.name} (${h.role}): ${h.text}`).join('\n\n')}\n\nSekarang giliran kamu. Berikan perspektif dari sudut keahlianmu, boleh merespons atau melengkapi pandangan advisor lain.`;

  const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${apiKey}`
    },
    body: JSON.stringify({
      model: 'llama-3.3-70b-versatile',
      max_tokens: 300,
      temperature: 0.75,
      messages: [
        { role: 'system', content: advisor.system },
        { role: 'user', content: context }
      ]
    })
  });

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error?.message || `HTTP ${res.status}`);
  }

  const data = await res.json();
  return data.choices[0].message.content.trim();
}

const sleep = ms => new Promise(r => setTimeout(r, ms));

// ── START SESSION ──
async function startSession() {
  if (isRunning) return;

  const topic = document.getElementById('topicInput').value.trim();
  if (!topic) { document.getElementById('topicInput').focus(); return; }

  const apiKey = getApiKey();
  if (!apiKey) {
    alert('Mohon isi Groq API Key terlebih dahulu di kolom kanan atas.');
    apiKeyInput.focus();
    return;
  }

  isRunning = true;
  history = [];

  document.getElementById('startBtn').disabled = true;
  document.getElementById('startBtn').textContent = '⏳ BERJALAN...';
  document.getElementById('topicDisplay').textContent = topic;
  document.getElementById('emptyState')?.remove();

  const badge = document.getElementById('sessionBadge');
  badge.classList.add('live');
  document.getElementById('sessionDot').classList.add('on');
  document.getElementById('sessionText').textContent = 'LIVE';

  document.getElementById('chatFeed').innerHTML = '';
  addSys('— SESI KONSULTASI DIMULAI —', true);
  await sleep(500);

  // Each advisor speaks
  for (const advisor of ADVISORS) {
    activate(advisor.id);
    await sleep(350);
    showTyping(advisor);

    try {
      const text = await callAdvisor(advisor, topic);
      removeTyping();
      addMsg(advisor, text);
      history.push({ name: advisor.name, role: advisor.role, text });
    } catch (err) {
      removeTyping();
      addMsg(advisor, `⚠ Gagal terhubung: ${err.message}`);
    }

    await sleep(900);
  }

  // Closing summary by Rina
  addSys('— RANGKUMAN SESI —');
  await sleep(500);

  const rina = ADVISORS[0];
  activate('bisnis');
  showTyping(rina);

  try {
    const closingCtx = `Masalah klien: "${topic}"\n\nDiskusi para advisor:\n${history.map(h => `${h.name} (${h.role}): ${h.text}`).join('\n\n')}\n\nTutup sesi: rangkum 2-3 poin terpenting yang disepakati para advisor, dan berikan 1 langkah pertama yang paling krusial untuk klien lakukan hari ini. Tetap 3 kalimat, mengalir, tanpa bullet.`;

    const apiKey = getApiKey();
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${apiKey}`
      },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        max_tokens: 350,
        temperature: 0.65,
        messages: [
          { role: 'system', content: rina.system },
          { role: 'user', content: closingCtx }
        ]
      })
    });

    if (res.ok) {
      const data = await res.json();
      const closing = data.choices[0].message.content.trim();
      removeTyping();
      addMsg(rina, closing);
    } else {
      removeTyping();
    }
  } catch {
    removeTyping();
  }

  activate(null);
  addSys('— SESI SELESAI —', true);

  badge.classList.remove('live');
  document.getElementById('sessionDot').classList.remove('on');
  document.getElementById('sessionText').textContent = 'STANDBY';
  document.getElementById('startBtn').disabled = false;
  document.getElementById('startBtn').textContent = '▶ KONSULTASI LAGI';
  isRunning = false;
}

// Enter key
document.getElementById('topicInput').addEventListener('keypress', e => {
  if (e.key === 'Enter' && !isRunning) startSession();
});

initPresets();
initList();
</script>
